name: destini_starting_master
description: "وهم — قصة رعب تفاعلية باللغة العربية. قراراتك تصنع مصيرك... لكن هل كل ما تراه حقيقي؟ اكتشف النهايات الستة، وابحث عن الحقيقة المخفية."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^5.2.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - images/background.png
    - assets/sounds/creepy.mp3
    - assets/sounds/creepy.ogg
    - assets/sounds/creepy.wav
